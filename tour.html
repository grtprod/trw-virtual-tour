<!DOCTYPE html>
<html>
<head>
<title>Virtual Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta charset="utf-8"/>

<style>
@font-face {
  font-family: 'Geist';
  src: url('./font/Geist-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

html,body{
  height:100%;
  margin:0;
  overflow:hidden;
  font-family: 'Geist', Arial, sans-serif;
  background:#000;
}

/* NAVBAR WITH BLUR */
#navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background: rgba(27,18,13,0.5); /* semi-transparent */
  backdrop-filter: blur(15px); /* background blur */
  -webkit-backdrop-filter: blur(15px); /* Safari support */
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 15px;
  box-sizing:border-box;
}

#logo img{
  height:60px;
  z-index:10;
  position: relative; 
}

/* MENU */
#menu{
  display:flex;
  gap:20px;
}

#menu .close-btn{
    display: none;
}

.dropdown{
  position:relative;
}

/* Main dropdown button with arrow */
.dropdown > button{
  font-family: 'Geist', Arial, sans-serif;
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  line-height: 28px;
  font-weight: 400;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
}

/* Arrow icon only for main button */
.dropdown > button::after {
  content: "";
  display: inline-block;
  width: 16px;
  height: 16px;
  margin-left: 10px;
  background-image: url('https://cdn.prod.website-files.com/646b26f8d9c8a8dbd4131e11/69b3925a35c4b0a728f55910_down-arrow.png');
  background-size: cover;
  background-repeat: no-repeat;
  transition: transform 0.3s ease;
}

.dropdown.open > button::after {
  transform: rotate(-180deg);
}

/* dropdown content buttons (no arrow) */
.dropdown-content button::after {
  content: none;
}

.dropdown-content{
  display:none;
  position:absolute;
  min-width:220px;
  margin-top: 10px;
  margin-left: 10px;
  /* background:#1b120d; */
  background: linear-gradient(135deg, #403224 0%, #171717 100%);
  top:30px;
  left:0;
  flex-direction:column;
  z-index:1000;
  padding: 10px;
  border-radius: 10px;
}

.dropdown-content button{
  font-family: 'Geist', Arial, sans-serif;
  background:#1b120d00;
  color:#fff;
  font-size: 18px;
  border:none;
  padding:8px 0px;
  padding-left: 10px;
  text-align:left;
  cursor:pointer;
  border-bottom:1px solid #333;
}

.dropdown-content button:hover{
  background:#333;
}

/* HAMBURGER */
#hamburger{
  display:none;
  font-size:18px;
  line-height: 28px;
  color:#fff;
  cursor:pointer;
}

/* Under 1280px */
@media (max-width:1280px){
  .dropdown > button{
    font-size:14px;
    line-height:20px;
  }

  .dropdown-content button{
  font-size: 14px;
  line-height:20px;
 
}
}

/* DESKTOP DROPDOWN FIX */
@media (min-width:769px){
  #menu .dropdown:last-child .dropdown-content{
    left:auto;
    right:0;
  }
  #menu .dropdown:nth-last-child(2) .dropdown-content{
    left:auto;
    right:0;
  }
  
}

/* MOBILE MENU FIXED FULL HEIGHT */
@media (max-width:768px){
  #menu{
    display:flex;
    flex-direction:column;
    position:fixed;
    top:0;
    right:-300px; /* hidden off-screen initially */
    width:250px;
    height:100vh; /* full viewport height */
    background:#1b120d;
    padding-top:100px; 
    padding-left:10px;
    padding-right:10px;
    gap:10px;
    transition:right 0.3s ease;
    z-index:10000;
    overflow-y:auto; /* allow vertical scrolling */
    -webkit-overflow-scrolling: touch; /* smooth scroll on iOS */
    -webkit-overflow-scrolling: touch; /* smooth scroll on iOS */
    box-sizing: border-box;  
  }

  

  #menu .close-btn{
    display:block;
    position:absolute;
    top:15px;
    right:12px;
    font-size:28px;
    color:#fff;
    cursor:pointer;
  }

  .dropdown-content{
    position:relative;
    top:0;
    background:#222;
    max-height: calc(100vh - 120px); /* prevent dropdown from going outside menu */
    overflow-y: auto;  
  }

  #hamburger{
    display:block;
  }

  .hamburger-bg, .close-bg{
    background:#fff;
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
  }

  .hamburger-bg img, .close-bg img{
    width:20px;
    height:20px;
    display:block;
  }
  .dropdown > button{
    font-size:18px;
    line-height:28px;
  }

  .dropdown-content button{
  font-size: 18px;
  line-height:28px;
 
}
.dropdown-content{
  
  background: #1b120d;
  padding: 0px;
  border-radius: 10px;
  
}
.dropdown-content button {
    font-family: 'Geist', Arial, sans-serif;
    background: #1b120d;
    color: #fff;
    font-size: 18px;
    border: none;
    padding: 8px 10px;
    /* padding-left: 10px; */
    text-align: left;
    cursor: pointer;
    border-bottom: 1px solid #333;
}


}

/* TOUR */
#tour{
  width:100%;
  height:100%;
}
</style>

<script src="tour.js"></script>
</head>

<body>

<div id="navbar" class="nav">
  <div id="logo">
    <a href="https://taylorshostel.webflow.io/">
      <img src="https://cdn.prod.website-files.com/646b26f8d9c8a8dbd4131e11/697886dfd55de78aa1cfeadd_Mask%20group.svg" alt="" />
    </a>
  </div>

  <div id="hamburger" onclick="toggleMenu()">
    <div class="hamburger-bg">
      <img src="https://cdn.prod.website-files.com/646b26f8d9c8a8dbd4131e11/69b0fa589f2a34fcec990d0e_Frame%20(19).svg" alt="">
    </div>
  </div>

  <div id="menu">
    <div class="close-btn" onclick="closeMenu()">
      <div class="close-bg">
        <img src="https://cdn.prod.website-files.com/646b26f8d9c8a8dbd4131e11/69b0fa4de923db9d5789c32e_close-circle.svg" alt="">
      </div>
    </div>

    <!-- COMMON FACILITIES -->
    <div class="dropdown">
      <button>Common Facilities</button>
      <div class="dropdown-content">
        <button onclick="goScene('scene_0_lift_lobby')">Lift Lobby</button>
        <button onclick="goScene('scene_1_main_entrance')">Main Entrance</button>
        <button onclick="goScene('scene_2_main_walkway')">Main Walkway</button>
        <button onclick="goScene('scene_3_reception_helpdesk')">Reception</button>
        <button onclick="goScene('scene_4_u_lounge')">U Lounge</button>
        <button onclick="goScene('scene_5_u_garden')">U Garden</button>
        <button onclick="goScene('scene_6_u_lounge_discussion_room')">Discussion Room</button>
        <button onclick="goScene('scene_7_common_kitchen')">Common Kitchen</button>
        <button onclick="goScene('scene_8_outdoor_dining_area')">Outdoor Dining</button>
        <button onclick="goScene('scene_9_gym')">Gym</button>
        <button onclick="goScene('scene_10_swimming_pool')">Swimming Pool</button>
        <button onclick="goScene('scene_11_self_service_launderette')">Launderette</button>
      </div>
    </div>

    <!-- EN SUITES -->
    <div class="dropdown">
      <button>En-suites</button>
      <div class="dropdown-content">
        <button onclick="goScene('scene_12_en_suites_corridor')">Corridor</button>

        <button onclick="goScene('scene_15_en_suites_premium_single')">Premium Single</button>
      </div>
    </div>

    <!-- APARTMENT -->
    <div class="dropdown">
      <button>Apartment</button>
      <div class="dropdown-content">
        <button onclick="goScene('scene_16_apartment_corridor')">Corridor</button>
        <button onclick="goScene('scene_17_apartment_washroom')">Washroom</button>
        <button onclick="goScene('scene_18_apartment_kitchenette')">Kitchenette</button>
        <button onclick="goScene('scene_19_apartment_standard_single')">Standard Single</button>
        <button onclick="goScene('scene_20_apartment_standard_twin')">Standard Twin</button>
        <button onclick="goScene('scene_21_superiorsingle')">Superior Single</button>
        <button onclick="goScene('scene_22_ruemz_kitchen')">Ruemz Kitchen</button>
      </div>
    </div>

    <!-- RUEMZ -->
    <div class="dropdown">
      <button>Ruemz</button>
      <div class="dropdown-content">
        <button onclick="goScene('scene_23_ruemz_lounge')">Ruemz Lounge</button>
        <button onclick="goScene('scene_24_common_corridor')">Common Corridor</button>
        <button onclick="goScene('scene_25_lift_lobby')">Lift Lobby</button>
        <button onclick="goScene('scene_26_ruemz_en_suites_single')">En-suite Single</button>
        <button onclick="goScene('scene_27_superior_en_suites_single')">Superior En-suite</button>
        <button onclick="goScene('scene_28_en_suites_twin')">Twin</button>
        <button onclick="goScene('scene_29_delux_en_suites_twin')">Deluxe Twin</button>
        <button onclick="goScene('scene_30_delux_en_suites_twin_2')">Deluxe Twin 2</button>
        <button onclick="goScene('scene_31_entrance')">Entrance</button>
      </div>
    </div>

    <!-- OFF CAMPUS -->
    <div class="dropdown">
      <button>Off-campus</button>
      <div class="dropdown-content">
        <button onclick="goScene('scene_32_apartment_common')">Apartment Common</button>
        <button onclick="goScene('scene_33_single_room')">Single Room</button>
        <button onclick="goScene('scene_34_twin_room')">Twin Room</button>
        <button onclick="goScene('scene_35_student_lounge')">Student Lounge</button>
        <button onclick="goScene('scene_36_common_kitchen')">Common Kitchen</button>
        <button onclick="goScene('scene_37_gym')">Gym</button>
      </div>
    </div>

  </div>
</div>

<div id="tour"></div>

<script>
embedpano({
  xml:"tour.xml",
  target:"tour",
  id:"krpanoSWFObject",
  html5:"only",
  passQueryParameters:true
});

function goScene(scene){
  var krpano=document.getElementById("krpanoSWFObject");
  if(krpano && krpano.call){
    krpano.call("loadscene("+scene+", null, MERGE, BLEND(1));");
  }
  if(window.innerWidth<768){
    closeMenu();
  }
}

function toggleMenu(){
  var menu=document.getElementById("menu");
  if(menu.style.right==="0px"){
    menu.style.right="-300px";
  }else{
    menu.style.right="0px";
  }
}

function closeMenu(){
  document.getElementById("menu").style.right="-300px";
}

// DROPDOWN ON CLICK WITH ARROW ROTATION
var dropdowns = document.querySelectorAll('.dropdown');
dropdowns.forEach(function(dropdown){
  var button = dropdown.querySelector('button');
  var content = dropdown.querySelector('.dropdown-content');

  button.addEventListener('click', function(e){
    e.stopPropagation();

    dropdowns.forEach(function(other){
      if(other !== dropdown){
        other.querySelector('.dropdown-content').style.display = 'none';
        other.classList.remove('open');
      }
    });

    if(content.style.display === 'flex'){
      content.style.display = 'none';
      dropdown.classList.remove('open');
    }else{
      content.style.display = 'flex';
      content.style.flexDirection = 'column';
      dropdown.classList.add('open');
    }
  });
});

// Close dropdowns if click outside
window.addEventListener('click', function(){
  dropdowns.forEach(function(dropdown){
    dropdown.querySelector('.dropdown-content').style.display = 'none';
    dropdown.classList.remove('open');
  });
});

document.querySelector('#logo a').addEventListener('click', function(e){
  e.preventDefault(); // prevent iframe default
  window.top.location.href = this.href; // parent page reload
});

</script>

</body>
</html>
